name: Run Tests Only

on:
  workflow_dispatch: {}
  pull_request: {}

permissions:
  contents: read

jobs:
  run-tests:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --user pipx
          pipx install poetry

      - name: Build & Test
        run: |
          poetry install
          poetry run pytest -m "not integration and not cli"

      - name: Test CLI scenarios
        run: |
          poetry run pytest -m "cli" -s
